<!DOCTYPE html>
<html lang="fr" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Atome - SoliCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>

<body class="p-10 bg-gray-900/50 backdrop-blur-sm flex items-center justify-center min-h-screen font-sans">
    <!-- Atom: Modal Content Base (Exactly as in portail-candidat-interactif.html) -->
    <div
        class="w-full max-w-lg bg-white border shadow-2xl rounded-3xl overflow-hidden transform transition-all duration-300">
        <div class="h-2 bg-green-600"></div>
        <div class="p-8 sm:p-12 text-center">
            <div class="mb-6 flex justify-center">
                <span class="inline-flex justify-center items-center size-16 rounded-full bg-green-50 text-green-600">
                    <svg class="size-8" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </span>
            </div>
            <h3 class="mb-2 text-2xl font-bold text-gray-800">Vérification de présence</h3>
            <p class="text-gray-500 mb-8">Veuillez saisir le code secret à 4 chiffres affiché à l'entrée.</p>
            <div class="flex justify-center gap-x-3 mb-10">
                <input type="text" maxlength="4"
                    class="block w-48 py-4 px-3 text-center text-4xl font-bold text-gray-800 bg-gray-50 border-2 border-gray-200 rounded-2xl focus:border-blue-600 focus:ring-blue-600 focus:outline-none transition-all tracking-[0.5em]"
                    placeholder="0000">
            </div>
            <div class="flex flex-col gap-3">
                <button type="button"
                    class="py-4 px-6 text-sm font-bold rounded-2xl bg-green-600 text-white hover:bg-green-700 shadow-xl shadow-green-600/20 transition-all active:scale-95">Confirmer
                    ma présence</button>
                <button type="button"
                    class="py-3 px-6 text-sm font-medium rounded-2xl text-gray-500 hover:text-gray-800 transition-colors">Annuler</button>
            </div>
        </div>
    </div>
</body>

</html>
