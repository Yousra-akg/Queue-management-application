<!DOCTYPE html>
<html lang="fr" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouton Présence Atome - SoliCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>

<body class="p-10 bg-gray-50 flex flex-col gap-8 items-center justify-center min-h-screen font-sans">
    <!-- Atom: Presence Button (Disabled State) -->
    <div class="flex flex-col items-center gap-2 w-full max-w-xs">
        <button type="button" disabled
            class="w-full py-4 px-8 inline-flex justify-center items-center gap-x-3 text-lg font-bold rounded-2xl border border-transparent bg-gray-200 text-gray-400 cursor-not-allowed transition-all duration-500">
            <svg class="flex-shrink-0 size-6 text-current" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            Je suis présent(e)
        </button>
        <span class="text-[10px] font-black uppercase text-gray-400 tracking-widest">État : Désactivé (Attente)</span>
    </div>

    <!-- Atom: Presence Button (Active/Live State) -->
    <div class="flex flex-col items-center gap-2 w-full max-w-xs">
        <button type="button"
            class="w-full py-4 px-8 inline-flex justify-center items-center gap-x-3 text-lg font-bold rounded-2xl border border-transparent bg-blue-600 text-white hover:bg-blue-700 shadow-2xl shadow-blue-600/30 animate-pulse transition-all duration-500 transform hover:scale-105">
            <svg class="flex-shrink-0 size-6 text-current" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            Je suis présent(e)
        </button>
        <span class="text-[10px] font-black uppercase text-blue-600 tracking-widest">État : Activé (Interactif)</span>
    </div>
</body>

</html>
