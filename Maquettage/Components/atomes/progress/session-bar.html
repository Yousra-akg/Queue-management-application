<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            background: #f8fafc;
        }
    </style>
</head>

<body>
    <div class="max-w-md space-y-8">
        <div>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Progress: Simple Blue</p>
            <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                <div class="bg-blue-600 h-full rounded-full" style="width: 45%"></div>
            </div>
        </div>

        <div>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Progress: Success Green</p>
            <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                <div class="bg-green-500 h-full rounded-full" style="width: 100%"></div>
            </div>
        </div>

        <div>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Progress: Critical Red</p>
            <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                <div class="bg-red-500 h-full rounded-full" style="width: 90%"></div>
            </div>
        </div>

        <div>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Session Occupancy Style</p>
            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                <div class="flex justify-between mb-2">
                    <span class="text-[11px] font-black text-slate-900 uppercase">Occupation Session</span>
                    <span class="text-[11px] font-black text-blue-600 uppercase">22/50</span>
                </div>
                <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                    <div class="bg-blue-600 h-full rounded-full" style="width: 44%"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
