<!DOCTYPE html>
<html lang="fr" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouton Admin Atome - SoliCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>

<body class="p-10 bg-slate-50 flex items-center justify-center min-h-screen font-sans">
    <!-- Atom: Admin Button -->
    <button type="submit"
        class="w-full max-w-[280px] py-4 px-6 inline-flex justify-center items-center gap-x-3 text-sm font-black rounded-2xl border border-transparent bg-[#0a2351] text-white hover:bg-indigo-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-all duration-500 shadow-2xl shadow-blue-900/20 transform hover:scale-[1.02] active:scale-[0.98] group">
        Accéder au Dashboard
        <svg class="flex-shrink-0 size-4 transition-transform group-hover:translate-x-1"
            xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
    </button>
</body>

</html>
