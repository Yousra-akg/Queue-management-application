<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            background: #f8fafc;
        }
    </style>
</head>

<body>
    <div class="space-y-12">
        <!-- Minimal Countdown -->
        <div>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Minimal Countdown</p>
            <div class="flex gap-4">
                <div class="text-center">
                    <span class="block text-2xl font-black text-slate-900 tabular-nums">02</span>
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Jours</span>
                </div>
                <div class="text-2xl font-black text-slate-300">:</div>
                <div class="text-center">
                    <span class="block text-2xl font-black text-slate-900 tabular-nums">14</span>
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Heures</span>
                </div>
                <div class="text-2xl font-black text-slate-300">:</div>
                <div class="text-center">
                    <span class="block text-2xl font-black text-blue-600 tabular-nums animate-pulse">45</span>
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Min</span>
                </div>
            </div>
        </div>

        <!-- Card Countdown -->
        <div>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Card Style Countdown</p>
            <div class="inline-flex items-center gap-3 p-4 bg-white border border-slate-100 rounded-[2rem] shadow-sm">
                <div class="size-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center">
                    <svg class="size-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                </div>
                <div class="pr-4">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Début
                        dans</p>
                    <p class="text-lg font-black text-slate-900 uppercase tracking-tighter tabular-nums">12:45:00</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
