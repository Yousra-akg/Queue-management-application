<!DOCTYPE html>
<html lang="fr" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Atome (Champ Saisie) - SoliCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="p-10 bg-gray-50 flex items-center justify-center min-h-screen font-sans">
    <div class="w-full max-w-sm">
        <label for="email" class="block text-sm font-semibold mb-2 text-gray-700">Adresse email</label>
        <!-- Atom: Input (Exactly as in login.html) -->
        <div class="relative group">
            <input type="email" id="email" name="email"
                class="py-3.5 px-4 ps-11 block w-full border-gray-200 rounded-2xl text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none bg-gray-50/50 focus:bg-white transition-all duration-300"
                required placeholder="nom@solicode.com">
            <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none ps-4">
                <svg class="flex-shrink-0 size-4 text-gray-400 group-focus-within:text-blue-500 transition-colors"
                    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="20" height="16" x="2" y="4" rx="2" />
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                </svg>
            </div>
        </div>
    </div>
</body>

</html>
