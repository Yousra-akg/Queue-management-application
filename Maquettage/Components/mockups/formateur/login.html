<!DOCTYPE html>
<html lang="fr" class="h-full light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Formateur - SoliCode Portail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        .animate-shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
</head>

<body class="bg-slate-50 flex h-full items-center py-16 font-sans">
    <main class="w-full max-w-md mx-auto p-6">
        <!-- Logo Header -->
        <div class="text-center mb-10">
            <a class="flex-none text-4xl font-black text-blue-900 tracking-tighter" href="#">Soli<span
                    class="text-blue-600">Code</span></a>
        </div>

        <!-- Login Card (Aligned with Molecule design) -->
        <div
            class="bg-white border border-slate-200 rounded-[3.5rem] shadow-[0_35px_60px_-15px_rgba(0,31,63,0.15)] p-8 sm:p-12 relative overflow-hidden transition-all duration-500 hover:shadow-blue-500/10">
            <div class="text-center mb-10">
                <div class="mb-6 flex justify-center">
                    <div
                        class="p-5 bg-blue-50 text-blue-600 rounded-[2.5rem] border border-blue-100 shadow-inner group">
                        <svg class="size-12 group-hover:scale-110 transition-transform duration-500"
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                </div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tighter uppercase mb-2">Espace Formateur</h1>
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest leading-relaxed">Connectez-vous
                    pour gérer vos
                    sessions</p>
            </div>

            <div id="error-badge"
                class="hidden mb-6 py-3 px-4 bg-red-100 border border-red-200 text-red-600 rounded-2xl flex items-center gap-3 animate-shake">
                <svg class="size-4 shrink-0" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                <p class="text-xs font-black uppercase tracking-tight">Email ou mot de passe incorrect</p>
            </div>

            <form id="trainer-login-form" class="space-y-6">
                <div>
                    <label for="email"
                        class="block text-xs font-black uppercase text-slate-500 tracking-widest mb-2 ml-1">Email
                        Professionnel</label>
                    <div class="relative group">
                        <input type="email" id="email" required
                            class="py-4 px-5 ps-12 block w-full border-slate-100 bg-slate-50 rounded-2xl text-sm font-bold focus:border-blue-600 focus:ring-blue-600 focus:bg-white transition-all shadow-inner"
                            placeholder="ahmed.mansouri@solicode.co">
                        <div class="absolute inset-y-0 start-0 flex items-center ps-4 pointer-events-none">
                            <svg class="size-5 text-slate-400 group-focus-within:text-blue-600 transition-colors"
                                xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect width="20" height="16" x="2" y="4" rx="2" />
                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2 ml-1">
                        <label for="password"
                            class="block text-xs font-black uppercase text-slate-500 tracking-widest">Mot de
                            passe</label>
                        <a href="#"
                            class="text-[10px] font-bold text-blue-600 hover:text-blue-800 transition-all uppercase">Oublié
                            ?</a>
                    </div>
                    <div class="relative group">
                        <input type="password" id="password" required
                            class="py-4 px-5 ps-12 block w-full border-slate-100 bg-slate-50 rounded-2xl text-sm font-bold focus:border-blue-600 focus:ring-blue-600 focus:bg-white transition-all shadow-inner"
                            placeholder="••••••••">
                        <div class="absolute inset-y-0 start-0 flex items-center ps-4 pointer-events-none">
                            <svg class="size-5 text-slate-400 group-focus-within:text-blue-600 transition-colors"
                                xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit"
                        class="w-full py-5 px-6 inline-flex justify-center items-center gap-x-3 text-sm font-black rounded-2xl border border-transparent bg-blue-600 text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-500 shadow-2xl shadow-blue-200 active:scale-95 group">
                        Se connecter
                        <svg class="size-4 group-hover:translate-x-1 transition-transform"
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m9 18 6-6-6-6" />
                        </svg>
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center">
                <a href="#" class="text-xs font-bold text-blue-600 hover:text-blue-800 transition-all uppercase">Mot de
                    passe
                    oublié ?</a>
            </div>
        </div>

        <div class="mt-12 text-center">
            <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.3em]">SoliCode Manager v1.0.4</p>
        </div>
    </main>

    <script>
        document.getElementById('trainer-login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBadge = document.getElementById('error-badge');

            if (email === 'formateur@gmail.com' && password === 'formateur123') {
                errorBadge.classList.add('hidden');
                window.location.href = 'selection-session.html';
            } else {
                errorBadge.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
