<!DOCTYPE html>
<html lang="fr" class="h-full light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - SoliCode Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        .geometric-bg {
            background-color: #f8fafc;
            background-image:
                radial-gradient(#e2e8f0 1.5px, transparent 1.5px),
                radial-gradient(#e2e8f0 1.5px, #f8fafc 1.5px);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
        }
    </style>
</head>

<body class="geometric-bg flex h-full items-center py-16 font-sans">
    <main class="w-full max-w-md mx-auto p-6">
        <!-- Logo Header -->
        <div class="text-center mb-8">
            <a class="flex-none text-4xl font-black text-[#0a2351] tracking-tighter" href="#">Soli<span
                    class="text-indigo-600">Admin</span></a>
        </div>

        <!-- Admin Login Card Molecule -->
        <div
            class="bg-white border border-blue-50 rounded-[3.5rem] shadow-[0_35px_60px_-15px_rgba(0,31,63,0.15)] p-8 sm:p-12 relative overflow-hidden transition-all duration-500 hover:shadow-indigo-500/10">
            <!-- Badge -->
            <div class="absolute top-0 right-0">
                <div
                    class="bg-[#0a2351] text-white text-[9px] font-black uppercase tracking-widest py-2 px-12 rotate-45 translate-x-12 translate-y-3 shadow-lg">
                    RESTRICTED</div>
            </div>

            <div class="text-center mb-10">
                <div class="mb-6 flex justify-center">
                    <div
                        class="p-5 bg-indigo-50 text-indigo-700 rounded-[2.5rem] border border-indigo-100 shadow-inner group">
                        <svg class="size-12 group-hover:scale-110 transition-transform duration-500"
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                            <path d="M12 8v4" />
                            <path d="M12 16h.01" />
                        </svg>
                    </div>
                </div>
                <h1 class="text-3xl font-black text-[#0a2351] tracking-tighter uppercase mb-2">Administration</h1>
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em]">Console de contrôle SoliCode
                </p>
            </div>

            <form id="admin-login-form" class="space-y-6">
                <!-- Username -->
                <div>
                    <label for="username" class="block text-sm font-bold mb-2 text-slate-700">Identifiant Unique</label>
                    <div class="relative group">
                        <input type="text" id="username" required
                            class="py-4 px-4 ps-12 block w-full border-slate-200 rounded-2xl text-sm font-medium focus:border-indigo-600 focus:ring-indigo-600 bg-slate-50/30 focus:bg-white transition-all shadow-inner"
                            placeholder="root_admin">
                        <div class="absolute inset-y-0 start-0 flex items-center ps-4 pointer-events-none">
                            <svg class="size-5 text-slate-400 group-focus-within:text-indigo-600 transition-colors"
                                xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-bold mb-2 text-slate-700">Clé Maîtresse</label>
                    <div class="relative group">
                        <input type="password" id="password" required
                            class="py-4 px-4 ps-12 block w-full border-slate-200 rounded-2xl text-sm font-medium focus:border-indigo-600 focus:ring-indigo-600 bg-slate-50/30 focus:bg-white transition-all shadow-inner"
                            placeholder="••••••••">
                        <div class="absolute inset-y-0 start-0 flex items-center ps-4 pointer-events-none">
                            <svg class="size-5 text-slate-400 group-focus-within:text-indigo-600 transition-colors"
                                xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Action Button -->
                <div class="pt-4">
                    <button type="submit"
                        class="w-full py-5 px-6 inline-flex justify-center items-center gap-x-3 text-sm font-black rounded-2xl border border-transparent bg-[#0a2351] text-white hover:bg-indigo-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all duration-500 shadow-2xl shadow-blue-900/40 transform hover:scale-[1.03] active:scale-[0.97] group">
                        Débloquer l'accès
                        <svg class="size-4 group-hover:rotate-12 transition-transform"
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                            <polyline points="10 17 15 12 10 7" />
                            <line x1="15" x2="3" y1="12" y2="12" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-center">
            <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.3em] mb-2">SoliCode Admin Dashboard
            </p>
            <div class="flex items-center justify-center gap-x-1.5">
                <svg class="size-3 text-green-500" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    <polyline points="9 12 11 14 15 10" />
                </svg>
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Sécurisé par SSL
                    256-bit</span>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.min.js"></script>
    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'admin@gmail.com' && password === 'admin123') {
                window.location.href = 'dashboard.html';
            } else {
                alert('Identifiants invalides. Veuillez utiliser admin@gmail.com / admin123');
            }
        });
    </script>
</body>

</html>
