<!DOCTYPE html>
<html lang="fr" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle Session - SoliCode Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/preline/dist/preline.css">
</head>

<body class="bg-[#f8fafc] min-h-screen font-sans">
    <!-- Sidebar -->
    <div id="application-sidebar"
        class="hs-overlay hs-overlay-open:translate-x-0 -translate-x-full transition-all duration-300 transform fixed top-0 start-0 bottom-0 z-[60] w-64 bg-slate-900 border-e border-slate-800 pt-7 pb-10 overflow-y-auto lg:block lg:translate-x-0 lg:end-auto lg:bottom-0">
        <div class="px-6">
            <a class="flex-none text-2xl font-black text-white tracking-tighter" href="#"
                aria-label="SoliCode Admin">Soli<span class="text-blue-500">Admin</span></a>
        </div>
        <nav class="p-6 w-full flex flex-col flex-wrap">
            <ul class="space-y-1.5">
                <li><a class="w-full flex items-center gap-x-3.5 py-2.5 px-3 text-sm text-slate-400 font-bold rounded-xl hover:bg-slate-800 hover:text-white transition-all"
                        href="dashboard.html">Dashboard</a></li>
                <li><a class="flex items-center gap-x-3.5 py-2.5 px-3 bg-blue-600 text-sm text-white font-black rounded-xl"
                        href="session-manager.html">Sessions</a></li>
            </ul>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="w-full lg:ps-64">
        <div class="p-4 sm:p-6 lg:p-10 max-w-4xl mx-auto">
            <!-- Header -->
            <div class="flex items-center gap-4 mb-10">
                <a href="dashboard.html"
                    class="p-3 bg-white border border-slate-200 rounded-2xl text-slate-500 hover:text-blue-600 hover:border-blue-600 transition-all shadow-sm">
                    <svg class="size-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                </a>
                <div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Nouvelle Session</h1>
                    <p class="text-sm text-slate-400 font-medium">Configuration des paramètres de la journée d'entretien
                    </p>
                </div>
            </div>

            <!-- Form Card -->
            <div class="bg-white border border-slate-200 rounded-[3rem] shadow-2xl p-8 sm:p-12">
                <form id="add-session-form" class="space-y-8">
                    <!-- Session Identity -->
                    <div class="grid gap-6">
                        <div>
                            <label class="block text-sm font-black text-slate-800 uppercase tracking-tighter mb-2">Nom
                                de la Session</label>
                            <input type="text" placeholder="Ex: Session Printemps - J5"
                                class="py-4 px-5 block w-full border-slate-200 rounded-2xl text-base font-bold text-slate-700 focus:border-blue-600 focus:ring-blue-600 bg-slate-50/50">
                        </div>

                        <div class="grid sm:grid-cols-2 gap-6">
                            <div>
                                <label
                                    class="block text-sm font-black text-slate-800 uppercase tracking-tighter mb-2 text-indigo-600">Date
                                    de l'entretien</label>
                                <input type="date"
                                    class="py-4 px-5 block w-full border-slate-200 rounded-2xl text-base font-bold text-slate-700 focus:border-blue-600 focus:ring-blue-600 bg-slate-50/50">
                            </div>
                            <div>
                                <label
                                    class="block text-sm font-black text-slate-800 uppercase tracking-tighter mb-2">Capacité
                                    Max</label>
                                <input type="number" value="60"
                                    class="py-4 px-5 block w-full border-slate-200 rounded-2xl text-base font-bold text-slate-700 focus:border-blue-600 focus:ring-blue-600 bg-slate-50/50">
                            </div>
                        </div>
                    </div>

                    <hr class="border-slate-100">

                    <!-- Time Slots -->
                    <div class="grid sm:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-black text-slate-800 uppercase tracking-tighter mb-2">Heure
                                de début</label>
                            <input type="time" value="09:00"
                                class="py-4 px-5 block w-full border-slate-200 rounded-2xl text-base font-bold text-slate-700 focus:border-blue-600 focus:ring-blue-600 bg-slate-50/50">
                        </div>
                        <div>
                            <label class="block text-sm font-black text-slate-800 uppercase tracking-tighter mb-2">Heure
                                de fin</label>
                            <input type="time" value="17:00"
                                class="py-4 px-5 block w-full border-slate-200 rounded-2xl text-base font-bold text-slate-700 focus:border-blue-600 focus:ring-blue-600 bg-slate-50/50">
                        </div>
                    </div>

                    <!-- Code Generator Widget -->
                    <div
                        class="bg-indigo-900 border border-slate-100 rounded-[2rem] p-6 shadow-xl flex flex-col sm:flex-row items-center justify-between gap-6">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-indigo-700 text-white rounded-2xl">
                                <svg class="size-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-1">Code de
                                    Présence Session</p>
                                <input type="text" id="access-code" readonly value="8271"
                                    class="bg-transparent border-none p-0 text-3xl font-black text-white focus:ring-0 w-32 tracking-wider">
                            </div>
                        </div>
                        <button type="button" onclick="generateCode()"
                            class="px-6 py-3 bg-white text-indigo-900 text-xs font-black uppercase tracking-tighter rounded-2xl hover:bg-slate-100 transition-all shadow-lg active:scale-95">Régénérer
                            le code</button>
                    </div>

                    <!-- Actions -->
                    <div class="flex flex-col sm:flex-row gap-4 pt-6">
                        <button type="button"
                            class="flex-1 py-4 px-6 text-sm font-black text-slate-400 uppercase rounded-2xl border border-slate-100 hover:bg-slate-50 transition-all">Annuler</button>
                        <button type="submit"
                            class="flex-[2] py-4 px-6 text-sm font-black text-white uppercase rounded-2xl bg-blue-600 hover:bg-blue-700 shadow-2xl shadow-blue-500/30 transition-all group flex items-center justify-center gap-3">
                            Créer la session et affecter
                            <svg class="size-4 group-hover:translate-x-1 transition-transform"
                                xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M5 12h14" />
                                <path d="m12 5 7 7-7 7" />
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function generateCode() {
            const code = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('access-code').value = code;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.min.js"></script>
</body>

</html>
