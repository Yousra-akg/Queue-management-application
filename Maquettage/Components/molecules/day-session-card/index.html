<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            background: #f8fafc;
        }
    </style>
</head>

<body>
    <div
        class="max-w-sm bg-white border border-blue-50 rounded-[2.5rem] p-6 shadow-sm hover:shadow-indigo-500/5 transition-all">
        <div class="flex justify-between items-start mb-6">
            <div class="p-3 bg-blue-50 text-blue-600 rounded-2xl">
                <svg class="size-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                    <line x1="16" y1="2" x2="16" y2="6" />
                    <line x1="8" y1="2" x2="8" y2="6" />
                    <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
            </div>
            
        </div>

        <h3 class="text-base font-black text-slate-900 uppercase mb-1">Session - J1</h3>
        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-tighter mb-6">Lundi 15 Juin • 09:00 - 13:00
        </p>

        <div class="space-y-4">
            <div class="flex justify-between items-end">
                <div class="space-y-1">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Occupation</p>
                    <p class="text-sm font-black text-slate-900">42 <span class="text-slate-300">/ 50</span></p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Taux</p>
                    <p class="text-sm font-black text-blue-600">84%</p>
                </div>
            </div>
            <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                <div class="bg-blue-600 h-full rounded-full" style="width: 84%"></div>
            </div>
        </div>

        
    </div>
</body>

</html>
