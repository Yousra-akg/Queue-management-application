<!DOCTYPE html>
<html lang="fr" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Connexion Admin Molécule - SoliCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body class="p-10 bg-slate-50 flex items-center justify-center min-h-screen font-sans">
    <div class="w-full max-w-md">
        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 text-center">Aperçu
            Molécule : Admin Login Card</label>

        <!-- Admin Login Card -->
        <div class="bg-white border border-slate-100 rounded-[3rem] shadow-2xl p-8 sm:p-12 relative overflow-hidden">
            <!-- Restricted Access Badge -->
            <div class="absolute top-0 right-0">
                <div
                    class="bg-slate-900 text-white text-[9px] font-black uppercase tracking-widest py-2 px-10 rotate-45 translate-x-10 translate-y-3">
                    Accès Restreint</div>
            </div>

            <div class="text-center mb-10">
                <div class="mb-6 flex justify-center">
                    <div class="p-4 bg-indigo-50 text-indigo-700 rounded-3xl border border-indigo-100 shadow-inner">
                        <svg class="size-10" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                            <path d="M12 8v4" />
                            <path d="M12 16h.01" />
                        </svg>
                    </div>
                </div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight uppercase">Administration Centrale</h1>
                <p class="mt-2 text-sm text-slate-400 font-medium italic">Accès hautement sécurisé</p>
            </div>

            <form class="space-y-6">
                <!-- Fields logic would go here -->
                <div>
                    <label class="block text-sm font-semibold mb-2 text-slate-700">Identifiant Admin</label>
                    <div class="relative group">
                        <input type="text"
                            class="py-3.5 px-4 ps-11 block w-full border-slate-200 rounded-2xl text-sm focus:border-indigo-600 focus:ring-indigo-600 bg-slate-50/30 focus:bg-white transition-all shadow-sm">
                        <div class="absolute inset-y-0 start-0 flex items-center ps-4 pointer-events-none">
                            <svg class="size-4 text-slate-400 group-focus-within:text-indigo-600"
                                xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2 text-slate-700">Clé d'Accès</label>
                    <div class="relative group">
                        <input type="password"
                            class="py-3.5 px-4 ps-11 block w-full border-slate-200 rounded-2xl text-sm focus:border-indigo-600 focus:ring-indigo-600 bg-slate-50/30 focus:bg-white transition-all shadow-sm">
                        <div class="absolute inset-y-0 start-0 flex items-center ps-4 pointer-events-none">
                            <svg class="size-4 text-slate-400 group-focus-within:text-indigo-600"
                                xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </div>
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-4 px-6 inline-flex justify-center items-center gap-x-3 text-sm font-black rounded-2xl border border-transparent bg-slate-900 text-white hover:bg-indigo-900 transition-all duration-500 shadow-xl shadow-slate-900/20 transform hover:scale-[1.02] active:scale-[0.98]">
                    Démarrer la session Admin
                </button>
            </form>
        </div>
    </div>
</body>

</html>
