<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            background: #f8fafc;
        }
    </style>
</head>

<body>
    <div
        class="max-w-xs mx-auto text-center p-8 bg-white border border-slate-100 rounded-[3rem] shadow-2xl relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute top-0 inset-x-0 h-2 bg-gradient-to-r from-blue-500 via-indigo-600 to-purple-600"></div>

        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mb-4">Votre Ticket</p>

        <div class="py-6">
            <h2 class="text-7xl font-black text-slate-900 tracking-tighter tabular-nums drop-shadow-sm">Q-042</h2>
        </div>

        <div class="inline-flex items-center gap-2 py-2 px-6 bg-blue-50 text-blue-600 rounded-2xl mb-8">
            <svg class="size-4 animate-pulse" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
            </svg>
            <span class="text-xs font-black uppercase">En attente</span>
        </div>

        <div class="pt-6 border-t border-slate-50">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Session Web - J1</p>
            <p class="text-xs font-black text-slate-900 uppercase">Salle 104 • 09:45</p>
        </div>
    </div>
</body>

</html>
