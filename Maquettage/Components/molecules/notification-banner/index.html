<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            background: #f8fafc;
        }
    </style>
</head>

<body>
    <div class="max-w-2xl space-y-6">
        <!-- Info Banner -->
        <div class="relative bg-blue-900 rounded-3xl p-6 overflow-hidden shadow-2xl">
            <div class="absolute -top-12 -right-12 size-48 bg-blue-600 rounded-full blur-3xl opacity-20"></div>
            <div class="relative flex items-center gap-6">
                <div
                    class="size-12 bg-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center text-white shrink-0">
                    <svg class="size-6" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="16" x2="12" y2="12" />
                        <line x1="12" y1="8" x2="12.01" y2="8" />
                    </svg>
                </div>
                <div class="flex-1">
                    <h4 class="text-sm font-black text-white uppercase tracking-tight">Rappel de Session</h4>
                    <p class="text-[11px] font-bold text-blue-200/80 uppercase mt-0.5">La session Mobile J2 commence
                        dans 2h.</p>
                </div>
                <button class="bg-white/10 hover:bg-white/20 p-2 rounded-xl transition-all">
                    <svg class="size-4 text-white" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Warning/Alert Banner -->
        <div class="bg-orange-50 border border-orange-100 rounded-3xl p-5 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="size-10 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center shrink-0">
                    <svg class="size-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
                        <line x1="12" y1="9" x2="12" y2="13" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </svg>
                </div>
                <div>
                    <p class="text-xs font-black text-orange-900 uppercase">Capacité atteinte</p>
                    <p class="text-[10px] font-bold text-orange-600 uppercase tracking-tight">La session Web J1 est
                        complète. Veuillez créer une nouvelle session.</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
