<!DOCTYPE html>
<html lang="fr" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligne Candidat Molécule - SoliCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/preline/dist/preline.css">
</head>

<body class="p-8 font-sans bg-gray-50">
    <div class="max-w-4xl space-y-6">
        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Aperçu Molécule : Ligne
            Candidat (États Terminés & En cours)</label>

        <!-- Candidate Row (Terminé - Match screenshot) -->
        <div class="candidate-card bg-white border border-green-100 rounded-2xl p-4 transition-all duration-300">
            <div class="flex items-center gap-x-4 flex-grow">
                <div
                    class="size-12 rounded-full bg-[#22c55e] text-white flex items-center justify-center font-bold text-base shadow-lg shadow-green-500/20">
                    AM</div>
                <div class="flex-grow">
                    <h4 class="font-bold text-gray-900 text-lg">Ahmed Mansouri</h4>
                    <span
                        class="inline-flex items-center gap-x-1.5 py-1 px-2 rounded-lg text-[10px] font-black uppercase tracking-tighter bg-[#22c55e] text-white mt-1 shadow-sm">
                        <svg class="size-2.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 6 9 17l-5-5" />
                        </svg>
                        Entretien terminé
                    </span>
                </div>
                <div class="flex items-center gap-x-4">
                    <select
                        class="py-2.5 px-3 pe-9 block border-gray-100 rounded-xl text-xs font-bold focus:border-blue-500 focus:ring-blue-500 bg-gray-50/50 min-w-[140px]">
                        <option value="waiting">En attente</option>
                        <option value="in_progress">En cours</option>
                        <option value="done" selected>Terminé</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Candidate Row (En cours - Match screenshot) -->
        <div class="candidate-card bg-white border border-blue-100 rounded-2xl p-4 transition-all duration-300">
            <div class="flex items-center gap-x-4 flex-grow">
                <div
                    class="size-12 rounded-full bg-[#2563eb] text-white flex items-center justify-center font-bold text-base shadow-lg shadow-blue-500/20">
                    SF</div>
                <div class="flex-grow">
                    <h4 class="font-bold text-gray-900 text-lg">Sarah Fassi</h4>
                    <span
                        class="inline-flex items-center gap-x-1.5 py-1 px-2 rounded-lg text-[10px] font-black uppercase tracking-tighter bg-[#2563eb] text-white mt-1 shadow-sm">
                        <span class="size-1.5 inline-block rounded-full bg-white animate-pulse"></span>
                        En cours d'entretien
                    </span>
                </div>
                <div class="flex items-center gap-x-4">
                    <select
                        class="status-select py-2.5 px-3 pe-9 block border-gray-100 rounded-xl text-xs font-bold focus:border-blue-500 focus:ring-blue-500 bg-gray-50/50 min-w-[140px]">
                        <option value="waiting">En attente</option>
                        <option value="in_progress" selected>En cours</option>
                        <option value="done">Terminé</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Candidate Row (En attente - Standard) -->
        <div
            class="candidate-card bg-white border border-gray-100 rounded-2xl p-4 hover:shadow-md transition-all duration-300">
            <div class="flex items-center gap-x-4 flex-grow">
                <div
                    class="size-12 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center font-bold text-base">
                    YA</div>
                <div class="flex-grow">
                    <h4 class="font-bold text-gray-800 text-lg">Yousra Akg</h4>
                    <span
                        class="inline-flex items-center gap-x-1.5 py-1 px-2 rounded-lg text-[10px] font-black uppercase tracking-tighter bg-green-100 text-green-700 mt-1">
                        <span class="size-1.5 inline-block rounded-full bg-green-600"></span>
                        QCM Validé
                    </span>
                </div>
                <div class="flex items-center gap-x-4">
                    <select
                        class="py-2.5 px-3 pe-9 block border-gray-100 rounded-xl text-xs font-bold focus:border-blue-500 focus:ring-blue-500 bg-white min-w-[140px]">
                        <option value="waiting" selected>En attente</option>
                        <option value="in_progress">En cours</option>
                        <option value="done">Terminé</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.min.js"></script>
</body>

</html>
