<!DOCTYPE html>
<html lang="fr" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molécule Formulaire de Connexion - SoliCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/preline/dist/preline.css">
</head>

<body class="p-10 bg-[#f9fafb] flex items-center justify-center min-h-screen font-sans">
    <div class="w-full max-w-md">
        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6 text-center">Aperçu
            Molécule : Login Form</label>

        <!-- Form Section (Exactly as in login.html) -->
        <div class="bg-white border border-gray-100 rounded-[3rem] shadow-2xl p-8 sm:p-10">
            <form>
                <div class="grid gap-y-6">
                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-sm font-semibold mb-2 text-gray-700">Adresse email</label>
                        <div class="relative group">
                            <input type="email" id="email" name="email"
                                class="py-3.5 px-4 ps-11 block w-full border-gray-200 rounded-2xl text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none bg-gray-50/50 focus:bg-white transition-all duration-300"
                                required placeholder="nom@solicode.com">
                            <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none ps-4">
                                <svg class="flex-shrink-0 size-4 text-gray-400 group-focus-within:text-blue-500 transition-colors"
                                    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect width="20" height="16" x="2" y="4" rx="2" />
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div>
                        <div class="flex justify-between items-center">
                            <label for="password" class="block text-sm font-semibold mb-2 text-gray-700">Mot de
                                passe</label>
                            <a class="text-xs text-blue-600 font-bold hover:text-blue-700 transition-colors"
                                href="#">Mot de passe oublié ?</a>
                        </div>
                        <div class="relative group">
                            <input type="password" id="password" name="password"
                                class="py-3.5 px-4 ps-11 block w-full border-gray-200 rounded-2xl text-sm focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none bg-gray-50/50 focus:bg-white transition-all duration-300"
                                required placeholder="••••••••">
                            <div class="absolute inset-y-0 start-0 flex items-center pointer-events-none ps-4">
                                <svg class="flex-shrink-0 size-4 text-gray-400 group-focus-within:text-blue-500 transition-colors"
                                    xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Options -->
                    <div class="flex items-center">
                        <div class="flex">
                            <input id="remember-me" name="remember-me" type="checkbox"
                                class="shrink-0 mt-0.5 border-gray-200 rounded text-blue-600 focus:ring-blue-500 size-4 cursor-pointer">
                        </div>
                        <div class="ms-3">
                            <label for="remember-me"
                                class="text-sm text-gray-500 font-medium cursor-pointer select-none">Se souvenir de
                                moi</label>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit"
                        class="w-full py-4 px-6 inline-flex justify-center items-center gap-x-3 text-sm font-bold rounded-2xl border border-transparent bg-blue-600 text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all duration-300 shadow-xl shadow-blue-500/30 transform hover:scale-[1.02] active:scale-[0.98] group">
                        Se connecter
                        <svg class="flex-shrink-0 size-4 transition-transform group-hover:translate-x-1"
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                            <polyline points="10 17 15 12 10 7" />
                            <line x1="15" x2="3" y1="12" y2="12" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
