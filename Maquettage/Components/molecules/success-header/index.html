<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            background: #f8fafc;
        }
    </style>
</head>

<body>
    <div
        class="max-w-md mx-auto text-center py-12 px-6 bg-white border border-green-50 rounded-[4rem] shadow-2xl relative overflow-hidden">
        <!-- Floating Particles Decoration -->
        <div class="absolute -top-12 -left-12 size-32 bg-green-50 rounded-full blur-3xl opacity-50"></div>
        <div class="absolute -bottom-12 -right-12 size-32 bg-blue-50 rounded-full blur-3xl opacity-50"></div>

        <div class="mb-8 flex justify-center">
            <div
                class="size-24 bg-green-50 text-green-600 rounded-[2.5rem] flex items-center justify-center shadow-lg shadow-green-100 border border-green-100 animate-bounce">
                <svg class="size-12" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </div>
        </div>

        <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase mb-4">Succès !</h1>
        <p class="text-sm font-medium text-slate-500 mb-10 leading-relaxed">
            Votre inscription a été validée avec succès. <br>
            Un ticket numérique a été généré pour votre passage.
        </p>

        <button
            class="w-full py-5 bg-green-600 text-white text-xs font-black uppercase tracking-[0.2em] rounded-[2rem] hover:bg-green-700 shadow-2xl shadow-green-200 transition-all active:scale-95">
            Retour à l'accueil
        </button>
    </div>
</body>

</html>
