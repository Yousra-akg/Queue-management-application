<!DOCTYPE html>
<html lang="fr" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau File d'attente Molécule - SoliCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body class="p-10 bg-gray-50 flex flex-col items-center justify-center min-h-screen font-sans">
    <div class="w-full max-w-4xl">
        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 px-2">Aperçu Molécule :
            Queue Table (Fidélité Totale)</label>

        <!-- Molecule: Queue Table (Exactly as in User Screenshot) -->
        <div class="bg-white border border-gray-200 rounded-3xl shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 bg-gray-50/50">
                <h3 class="font-black text-gray-800 uppercase tracking-tighter text-sm">File d'attente en temps réel
                </h3>
            </div>
            <div class="overflow-hidden">
                <table class="w-full">
                    <tbody class="divide-y divide-white/10">
                        <!-- En cours (Solid Green) -->
                        <tr class="bg-[#22c55e] text-white">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold w-20">Pos 1</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-x-4">
                                    <div
                                        class="size-9 rounded-full bg-white/20 flex items-center justify-center font-bold text-xs">
                                        AM</div>
                                    <span class="font-bold">Ahmed Mansouri</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-end">
                                <span
                                    class="bg-white/10 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest border border-white/20">En
                                    cours</span>
                            </td>
                        </tr>

                        <tr class="bg-[#22c55e] text-white">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold w-20">Pos 2</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-x-4">
                                    <div
                                        class="size-9 rounded-full bg-white/20 flex items-center justify-center font-bold text-xs">
                                        OL</div>
                                    <span class="font-bold">Omar Lahlou</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-end">
                                <span
                                    class="bg-white/10 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest border border-white/20">En
                                    cours</span>
                            </td>
                        </tr>

                        <!-- Suivant (Lighter Green) -->
                        <tr class="bg-[#4ade80] text-white">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold w-20">Pos 4</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-x-4">
                                    <div
                                        class="size-9 rounded-full bg-white/20 flex items-center justify-center font-bold text-xs">
                                        SF</div>
                                    <span class="font-bold">Sarah Fassi</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 text-end">
                                <span
                                    class="bg-white/10 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest border border-white/20">Suivant</span>
                            </td>
                        </tr>

                        <!-- Votre Tour (White with Blue Highlights) -->
                        <tr class="bg-white">
                            <td class="px-6 py-5 whitespace-nowrap text-sm font-black text-blue-600 w-20">Pos 7</td>
                            <td class="px-6 py-5">
                                <div class="flex items-center gap-x-4">
                                    <div
                                        class="size-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-black text-sm">
                                        YA</div>
                                    <div>
                                        <p class="font-black text-gray-900">Yousra Akg</p>
                                        <p class="text-[10px] text-blue-600 font-black uppercase">Votre profil</p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-5 text-end">
                                <button type="button"
                                    class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest shadow-lg shadow-blue-600/30">Votre
                                    tour</button>
                            </td>
                        </tr>

                        <!-- Upcoming (Faded) -->
                        <tr class="bg-white opacity-40">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-400 w-20">Pos 8</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-x-4">
                                    <div
                                        class="size-9 rounded-full bg-gray-100 flex items-center justify-center font-bold text-xs text-gray-400">
                                        IB</div>
                                    <span class="text-sm text-gray-500 font-bold">Imane Benkirane</span>
                                </div>
                            </td>
                            <td class="px-6 py-4"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
